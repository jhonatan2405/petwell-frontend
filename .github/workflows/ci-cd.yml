name: CI/CD — Frontend (Next.js)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: CI — Type-check & Build validation
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: 🧪 CI — Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 Verificar tipos TypeScript
        run: npx tsc --noEmit

      - name: 🏗️ Validar build de producción (Next.js)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APPOINTMENT_SERVICE_URL: ${{ secrets.NEXT_PUBLIC_APPOINTMENT_SERVICE_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: CD — Deploy a Vercel (solo en push a main)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy → Vercel (Production)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🚀 Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔗 Vincular proyecto con Vercel
        run: vercel link --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🚀 Deploy en Vercel (producción)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: ✅ Deploy completado
        run: echo "🎉 Frontend desplegado en Vercel"
